<section class="description-product-page">
  <div class="top-container">
    <div class="container-btn-angle">
      <a routerLink="/layout/home-page" class="pi pi-angle-left"></a>
    </div>
  </div>
  <div class="description-container">
    <div class="content">
      <div class="img-container">
        <img [src]="product.img" alt="" />
        <p-inputNumber
        [(ngModel)]="value"
        [showButtons]="true"
        styleClass="btn-number"
        buttonLayout="vertical"
        spinnerMode="vertical"
        inputId="vertical"       
        incrementButtonIcon="pi pi-plus"
        decrementButtonIcon="pi pi-minus"
      
        min="1"
        max="100"
        
        
      />
        <div>

        </div>
      </div>
      <div class="description-content">
        <h2>{{ product.nameProduct }}</h2>
        <p>{{ product.price }}</p>
      </div>
      <p>{{ product.description }}</p>
    </div>
    <div class="btn-container">
      <button>
        Agregar al carrito
        <li class="pi pi-plus-circle"></li>
      </button>
    </div>
  </div>
 
</section>
