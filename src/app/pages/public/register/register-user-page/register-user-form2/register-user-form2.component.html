<section class="login-page-container">
  <!-- <div class="img-top"></div> -->
   <app-img-top></app-img-top>
   <div class="container-btn-angle">
    <a routerLink="/register-delivery-form1" class="pi pi-angle-left"></a>
  </div>
  <div class="form-section-container">
    <img src="../../../assets/images/Logo.svg" alt="">
    <div class="form-container">
      <h3>Completa los campos para continuar</h3>
      <form >
        <app-input-text id="email" class="w-full" label="Correo" icon="pi pi-envelope" placeholder="Ingrese un correo" />
        <app-input-text id="password" class="w-full" [active]="true"  label="Contraseña" icon="pi pi-key" placeholder="Ingrese una contraseña"/>
        <app-input-text id="repeatPassword" class="w-full" [active]="true"  label="Repetir contraseña" icon="pi pi-key" placeholder="Ingrese su contraseña"/>
        <app-button label="Registrarse" [click]="registerUser"/>
      </form>      
    </div>
  </div>
</section>
