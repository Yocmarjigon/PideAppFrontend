<section class="login-page-container">
  <!-- <div class="img-top"></div> -->
   <app-img-top></app-img-top>
   <div class="container-btn-angle">
    <a routerLink="/register-page" class="pi pi-angle-left"></a>
  </div>
  <div class="form-section-container">
    <img src="../../../assets/images/Logo.svg" alt="">
    <div class="form-container">
      <h3>Completa los campos para continuar</h3>
      <form >
        <app-input-text id="username" class="w-full" label="Nombre" icon="pi pi-user" placeholder="Ingrese su nombre completo" />
        <app-input-text id="numberPhone" class="w-full" [active]="false"  label="Teléfono" icon="pi pi-phone" placeholder="Ingrese su numero de telefono"/>
        <app-button label="Siguiente" [click]="nextForm"/>
      </form>      
    </div>
  </div>
</section>
